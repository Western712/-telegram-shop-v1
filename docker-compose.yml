services:
  postgres:
    image: postgres:16
    container_name: telegram_shop_db
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: telegram_shop_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
